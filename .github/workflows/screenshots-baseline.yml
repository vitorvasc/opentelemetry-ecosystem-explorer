name: PR Screenshots - Main Baseline

# Captures screenshots of main and commits them to `otelbot/screenshots/main/`.
# This baseline is the reference that `screenshots-commit.yml` diffs each PR
# against. Runs on every push to main that touches the explorer surface (or
# the screenshot script itself).
#
# Always trusted: triggered by push to main, never by fork code. `contents:
# write` is safe to grant directly without the two-workflow split that the
# PR capture pipeline uses.

on:
  push:
    branches: [main]
    paths:
      - "ecosystem-explorer/src/**"
      - "ecosystem-explorer/public/**"
      - "ecosystem-explorer/scripts/take-screenshots.mjs"
      - "ecosystem-explorer/package.json"
      - ".github/workflows/screenshots-baseline.yml"
  workflow_dispatch:

concurrency:
  group: screenshots-main-baseline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        working-directory: ecosystem-explorer
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: ecosystem-explorer
        run: bunx playwright install --with-deps chromium

      - name: Build the frontend with V1 flag on
        working-directory: ecosystem-explorer
        run: bun run build
        env:
          VITE_FEATURE_FLAG_COLLECTOR_PAGE: "true"
          VITE_FEATURE_FLAG_V1_REDESIGN: "true"
          VITE_FEATURE_FLAG_DEV_SHOWCASE: "true"

      - name: Take baseline screenshots
        working-directory: ecosystem-explorer
        run: |
          mkdir -p screenshots
          node scripts/take-screenshots.mjs

      - name: Stash baseline outside the working tree
        run: |
          mkdir -p /tmp/baseline
          cp ecosystem-explorer/screenshots/*.png /tmp/baseline/

      - name: Get otelbot token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Use CLA approved github bot
        run: .github/scripts/use-cla-approved-bot.sh

      - name: Commit baseline to otelbot/screenshots branch
        env:
          GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if git ls-remote --exit-code --heads origin otelbot/screenshots > /dev/null 2>&1; then
            git fetch origin otelbot/screenshots
            git checkout -B otelbot/screenshots FETCH_HEAD
          else
            git checkout --orphan otelbot/screenshots
            git rm -rf . --quiet 2>/dev/null || true
            git clean -fd --quiet
            git commit --allow-empty -m "chore: initialize screenshots branch"
          fi

          rm -rf -- main
          mkdir -p -- main
          cp /tmp/baseline/*.png main/
          git add -A -- main/
          short_sha="${COMMIT_SHA:0:7}"
          git diff --quiet --exit-code --cached || \
            git commit -m "chore: update main screenshot baseline (${short_sha})"
          git push origin otelbot/screenshots
