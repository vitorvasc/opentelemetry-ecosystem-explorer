name: Markdown Lint

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "**.md"
      - ".markdownlint.json"
      - ".github/workflows/markdown-lint.yml"

permissions:
  contents: read # Checkout the repository to lint Markdown files

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }} # Cancel in-progress runs on the same PR to avoid duplicate comments, but allow multiple runs on main for pushes and scheduled runs

jobs:
  lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run markdown linter
        run: bun run lint:md
