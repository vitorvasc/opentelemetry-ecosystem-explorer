name: Nightly Declarative Config Test

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read # Default minimum; the run-acceptance-test job declares its own elevated scopes

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-acceptance-test:
    name: Run Acceptance Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # Required to checkout the repository
      issues: write # Required to create bug report issues on test failure
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
          cache: true
          cache-dependency-path: ecosystem-explorer/bun.lock

      - name: Install dependencies
        run: |
          cd ecosystem-explorer
          bun install --frozen-lockfile

      - name: Build explorer
        run: |
          cd ecosystem-explorer
          bun run build

      - name: Install Playwright browsers
        run: |
          cd ecosystem-explorer
          bunx playwright install --with-deps chromium

      - name: Generate config file
        run: |
          cd ecosystem-explorer
          bun run scripts/generate-test-config.mjs ../acceptance-tests/declarative-config-acceptance/test-config.yaml

      - name: Download latest OpenTelemetry Java Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo open-telemetry/opentelemetry-java-instrumentation --pattern 'opentelemetry-javaagent.jar' --dir acceptance-tests/declarative-config-acceptance

      - name: Run OATS acceptance tests
        run: |
          go install github.com/grafana/oats@v0.7.0
          ~/go/bin/oats -timeout 5m acceptance-tests/declarative-config-acceptance/oats.yaml

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONFIG_CONTENT=""
          if [ -f acceptance-tests/declarative-config-acceptance/test-config.yaml ]; then
            CONFIG_CONTENT=$(cat acceptance-tests/declarative-config-acceptance/test-config.yaml)
          else
            CONFIG_CONTENT="No config file was generated."
          fi

          TITLE="Bug: Nightly Declarative Config Acceptance Test Failed"
          BODY=$(cat <<EOF
          The nightly end-to-end acceptance test for the Declarative Configuration Builder failed.

          **Run Details:**
          - Workflow Run: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID

          **Generated Configuration:**
          \`\`\`yaml
          $CONFIG_CONTENT
          \`\`\`

          Please inspect the workflow logs and verify if the Java agent has had schema regressions or if the builder generated invalid syntax.
          EOF
          )

          EXISTING=$(gh issue list \
            --search "in:title \"$TITLE\"" \
            --state open \
            --label bug \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Added comment to existing issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "bug"
            echo "Created new issue"
          fi
