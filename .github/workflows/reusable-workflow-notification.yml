name: Reusable - Workflow notification

on:
  workflow_call:
    inputs:
      success:
        type: boolean
        required: true
      watcher-name:
        type: string
        required: false
        default: ""
      failure-details:
        type: string
        required: false

permissions:
  contents: read # Checkout the reusable workflow source

jobs:
  workflow-notification:
    name: Open or update failure-notification issue
    permissions:
      contents: read # Checkout the reusable workflow source
      issues: write # Open or comment on the failure-tracking issue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Open issue or add comment if issue already open
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WATCHER_NAME: ${{ inputs['watcher-name']}}
          FAILURE_DETAILS: ${{ inputs['failure-details'] }}
          IS_SUCCESS: ${{ inputs.success }}
        run: |
          # Use watcher-specific title if provided, otherwise fall back to generic workflow title
          if [[ -n "$WATCHER_NAME" ]]; then
            ISSUE_TITLE="Workflow failed: $GITHUB_WORKFLOW ($WATCHER_NAME)"
          else
            ISSUE_TITLE="Workflow failed: $GITHUB_WORKFLOW (#$GITHUB_RUN_NUMBER)"
          fi

          number=$(gh issue list --search "in:title $ISSUE_TITLE" --limit 1 --json number -q .[].number)

          if [[ -n "$FAILURE_DETAILS" ]]; then
            issue_body="See [$GITHUB_WORKFLOW #$GITHUB_RUN_NUMBER](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)."$'\n\n'"## Failure Details"$'\n\n'"$FAILURE_DETAILS"
          else
            issue_body="See [$GITHUB_WORKFLOW #$GITHUB_RUN_NUMBER](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)."
          fi

          if [[ $number ]]; then
            if [[ "$IS_SUCCESS" == "true" ]]; then
              gh issue close $number
            else
              gh issue comment $number --body "$issue_body"
            fi
          elif [[ "$IS_SUCCESS" == "false" ]]; then
            gh issue create --title "$ISSUE_TITLE" --body "$issue_body"
          fi
