name: PR Screenshots - Commit

# Second half of a two-workflow setup for safe fork PR support.
# Triggered by screenshots-capture.yml completing (contents: write here, none there).
# Downloads artifacts uploaded by the capture job, pushes screenshots to the
# upstream `screenshots` orphan branch, and posts or updates a PR comment with
# inline images. No fork code ever runs in this job.

on:
  # Pairs with screenshots-capture.yml. The two-workflow split with
  # workflow_run is the GitHub-recommended way to safely handle fork
  # PR data: capture runs fork code with no write access; this job
  # only consumes its artifacts and never executes PR code.
  # https://docs.zizmor.sh/audits/#dangerous-triggers
  # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: ["PR Screenshots - Capture"]
    types: [completed]

concurrency:
  group: screenshots-${{ github.event.workflow_run.pull_requests[0].number }}
  cancel-in-progress: true

permissions:
  contents: read # Default minimum; the commit job declares its own elevated scopes

jobs:
  commit:
    name: Commit screenshots and comment on PR
    permissions:
      actions: read # Download artifacts uploaded by the triggering workflow run
      contents: write # Push screenshots to the otelbot/screenshots branch
      issues: write # gh api /repos/.../issues/comments (PR comments use the issues API)
      pull-requests: write # Post or update the screenshot diff comment on the PR
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download PR metadata artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-metadata-${{ github.event.workflow_run.id }}
          path: /tmp/pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR metadata
        id: metadata
        run: |
          echo "pr_number=$(cat /tmp/pr-metadata/pr_number.txt)" >> "$GITHUB_OUTPUT"
          echo "head_ref=$(cat /tmp/pr-metadata/head_ref.txt)"   >> "$GITHUB_OUTPUT"
          echo "head_repo=$(cat /tmp/pr-metadata/head_repo.txt)" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(cat /tmp/pr-metadata/head_sha.txt)"   >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # Persisted credentials are required so the later `git push origin
          # otelbot/screenshots` step can authenticate.
          persist-credentials: true

      - name: Download screenshots artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: screenshots-${{ github.event.workflow_run.id }}
          path: /tmp/screenshots
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download diff artifact (optional, may be absent if no baseline)
        id: diff-artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: screenshots-diff-${{ github.event.workflow_run.id }}
          path: /tmp/diff-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use CLA approved github bot
        run: .github/scripts/use-cla-approved-bot.sh

      - name: Build comment body
        env:
          PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
          HEAD_REF: ${{ steps.metadata.outputs.head_ref }}
          HEAD_REPO: ${{ steps.metadata.outputs.head_repo }}
          HEAD_SHA: ${{ steps.metadata.outputs.head_sha }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
          OUTPUT_PATH: /tmp/comment_body.txt
          DIFF_REPORT_PATH: /tmp/diff-artifact/diff-report.json
        run: python3 .github/scripts/build-screenshots-comment.py

      - name: Commit screenshots to otelbot/screenshots branch
        env:
          PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
        run: |
          if git ls-remote --exit-code --heads origin otelbot/screenshots > /dev/null 2>&1; then
            git fetch origin otelbot/screenshots
            git checkout -B otelbot/screenshots FETCH_HEAD
          else
            git checkout --orphan otelbot/screenshots
            git rm -rf . --quiet 2>/dev/null || true
            git clean -fd --quiet
            git commit --allow-empty -m "chore: initialize screenshots branch"
            git push origin otelbot/screenshots
          fi

          rm -rf -- "${PR_NUMBER}"
          mkdir -p -- "${PR_NUMBER}"
          UNEXPECTED=$(find /tmp/screenshots -mindepth 1 -maxdepth 1 -type f ! -name "*.png")
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::Unexpected file types in screenshots artifact:"
            echo "$UNEXPECTED"
            exit 1
          fi

          while IFS= read -r -d '' f; do
            size=$(stat -c%s "$f")
            if [ "$size" -gt $((5 * 1024 * 1024)) ]; then
              echo "::error::File exceeds 5 MB limit: $f ($size bytes)"
              exit 1
            fi
          done < <(find /tmp/screenshots -mindepth 1 -maxdepth 1 -type f -name "*.png" -print0)

          find /tmp/screenshots -mindepth 1 -maxdepth 1 -type f -name "*.png" -exec cp -- {} "${PR_NUMBER}/" \;

          # Replace any prior diffs subtree, then copy fresh diff PNGs (if the
          # capture step produced any). Absent baseline -> no diff artifact ->
          # nothing to copy here, and the diffs/ subdir simply stays empty.
          rm -rf -- "${PR_NUMBER}/diffs"
          if [ -d /tmp/diff-artifact/diffs ] && [ -n "$(find /tmp/diff-artifact/diffs -name '*.png' -print -quit)" ]; then
            mkdir -p "${PR_NUMBER}/diffs/main"
            while IFS= read -r -d '' f; do
              size=$(stat -c%s "$f")
              if [ "$size" -gt $((5 * 1024 * 1024)) ]; then
                echo "::error::Diff file exceeds 5 MB limit: $f ($size bytes)"
                exit 1
              fi
            done < <(find /tmp/diff-artifact/diffs -type f -name "*.png" -print0)
            # Preserve relative subdirs: diff-screenshots.mjs writes diff PNGs
            # at `<diffDir>/<rel>`, and the PR-comment link uses that same `<rel>`,
            # so flattening here would 404 (or collide) for any nested diff path.
            rsync -a --prune-empty-dirs --include='*/' --include='*.png' --exclude='*' \
              /tmp/diff-artifact/diffs/ "${PR_NUMBER}/diffs/main/"
          fi

          git add -A -- "${PR_NUMBER}/"
          git diff --quiet --exit-code --cached || git commit -m "docs: update screenshots for PR #${PR_NUMBER}"
          git push origin otelbot/screenshots

      - name: Get otelbot token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-pull-requests: write

      - name: Post or update PR comment
        env:
          PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.otelbot-token.outputs.token }}
        run: |
          jq -n --rawfile body /tmp/comment_body.txt '{body: $body}' > /tmp/comment_payload.json

          EXISTING_ID=$(gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.user.login == "otelbot[bot]") | select(.body | contains("<!-- screenshots-bot -->")) | .id] | first // empty')

          if [ -n "$EXISTING_ID" ]; then
            gh api "/repos/${REPO}/issues/comments/${EXISTING_ID}" -X PATCH --input /tmp/comment_payload.json
          else
            gh api "/repos/${REPO}/issues/${PR_NUMBER}/comments" -X POST --input /tmp/comment_payload.json
          fi
