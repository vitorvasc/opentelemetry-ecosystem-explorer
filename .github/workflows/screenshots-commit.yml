name: PR Screenshots - Commit

# Second half of a two-workflow setup for safe fork PR support.
# Triggered by screenshots-capture.yml completing (contents: write here, none there).
# Downloads artifacts uploaded by the capture job and commits them to the PR branch.
# Only works when the branch lives in the upstream repo — fork PRs will see the
# push step fail, which is accepted. Maintainer branches pushed to upstream work fine.

on:
  workflow_run:
    workflows: ["PR Screenshots - Capture"]
    types: [completed]

concurrency:
  group: screenshots-commit-${{ github.event.workflow_run.id }}

permissions:
  contents: write

jobs:
  commit:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download PR metadata artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-metadata-${{ github.event.workflow_run.id }}
          path: /tmp/pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR metadata
        id: metadata
        run: |
          PR_NUMBER=$(cat /tmp/pr-metadata/pr_number.txt)
          HEAD_REF=$(cat /tmp/pr-metadata/head_ref.txt)
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF"   >> "$GITHUB_OUTPUT"

      - name: Checkout upstream branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.metadata.outputs.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download screenshots artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: screenshots-${{ github.event.workflow_run.id }}
          path: ecosystem-explorer/screenshots
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push screenshots
        env:
          HEAD_REF: ${{ steps.metadata.outputs.head_ref }}
          PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ecosystem-explorer/screenshots/
          git diff --quiet --exit-code --cached || git commit -m "docs: add screenshots for PR #${PR_NUMBER}"
          git push origin "HEAD:${HEAD_REF}"
