name: Nightly Registry Update

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  synchronize-inventory:
    if:
      github.event_name != 'schedule' || github.repository ==
      'open-telemetry/opentelemetry-ecosystem-explorer'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    outputs:
      collector_result: ${{ steps.collector_watcher.outcome }}
      java_result: ${{ steps.java_instrumentation_watcher.outcome }}
      configuration_result: ${{ steps.configuration_watcher.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect repository type (if on a fork we use different git config)
        id: repo_check
        run: |
          if [ "${{ github.repository }}" == "open-telemetry/opentelemetry-ecosystem-explorer" ]; then
            echo "is_primary=true" >> $GITHUB_OUTPUT
          else
            echo "is_primary=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git (primary repository)
        if: steps.repo_check.outputs.is_primary == 'true'
        run: |
          .github/scripts/use-cla-approved-bot.sh

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        if: steps.repo_check.outputs.is_primary == 'true'
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Configure git (forked repository)
        if: steps.repo_check.outputs.is_primary == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cache repository clones
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tmp_repos
          key: tmp-repos
          restore-keys: |
            tmp-repos-

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync

      - name: Run collector-watcher
        id: collector_watcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run collector-watcher
        continue-on-error: true

      - name: Detect collector schema drift
        id: detect_schema_drift
        if: always()
        run: |
          FRESH="tmp_repos/opentelemetry-collector/cmd/mdatagen/metadata-schema.yaml"
          SCHEMAS_DIR="ecosystem-registry/collector/meta/schemas"

          if [ ! -f "$FRESH" ]; then
            echo "Fresh schema not found in cloned repo, skipping drift detection"
            echo "schema_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Schemas are stored in CAS at meta/schemas/{hash}.yaml. If a file
          # already exists for the fresh content's hash, we've stored it
          # before — no drift.
          FRESH_HASH=$(sha256sum "$FRESH" | cut -c1-12)
          if [ -f "$SCHEMAS_DIR/$FRESH_HASH.yaml" ]; then
            echo "schema_changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Drift detected. Diff against the schema referenced by the latest
          # non-SNAPSHOT release (any component YAML in that version directory
          # carries the canonical schema_hash) so the issue body shows what
          # actually changed.
          LATEST_VERSION=$(ls ecosystem-registry/collector/core 2>/dev/null \
            | grep -v SNAPSHOT | sort -V | tail -1)
          STORED=""
          if [ -n "$LATEST_VERSION" ]; then
            REF_FILE=$(find "ecosystem-registry/collector/core/$LATEST_VERSION" \
              -name '*.yaml' 2>/dev/null | head -1)
            if [ -n "$REF_FILE" ]; then
              STORED_HASH=$(grep '^schema_hash:' "$REF_FILE" | awk '{print $2}')
              [ -f "$SCHEMAS_DIR/$STORED_HASH.yaml" ] && STORED="$SCHEMAS_DIR/$STORED_HASH.yaml"
            fi
          fi

          echo "schema_changed=true" >> $GITHUB_OUTPUT
          if [ -n "$STORED" ]; then
            DIFF_OUTPUT=$(diff "$STORED" "$FRESH" | head -80 || true)
            {
              echo "schema_diff<<SCHEMA_DIFF_EOF"
              echo "$DIFF_OUTPUT"
              echo "SCHEMA_DIFF_EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Run java-instrumentation-watcher
        id: java_instrumentation_watcher
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run java-instrumentation-watcher
        continue-on-error: true

      - name: Run configuration-watcher
        id: configuration_watcher
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run configuration-watcher
        continue-on-error: true

      - name: Check for inventory changes
        id: check_changes
        if: always()
        run: |
          git add -N ecosystem-registry/ 2>/dev/null || true
          if git diff --quiet ecosystem-registry/ && [ -z "$(git ls-files --others --exclude-standard ecosystem-registry/)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Open or update schema drift issue
        if: steps.detect_schema_drift.outputs.schema_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCHEMA_DIFF: ${{ steps.detect_schema_drift.outputs.schema_diff }}
        run: |
          ISSUE_TITLE="[schema-drift] collector metadata-schema.yaml changed"
          EXISTING=$(gh issue list \
            --search "in:title \"$ISSUE_TITLE\"" \
            --state open \
            --label schema-drift \
            --json number \
            --jq '.[0].number // empty')

          ISSUE_BODY="The upstream \`metadata-schema.yaml\` has changed since the last stored registry snapshot.

          **Action required:** Review the diff below, determine if a new \`MetadataParserV*\` class is needed, and run a backfill if any output fields have changed.

          <details>
          <summary>Diff (stored → fresh)</summary>

          \`\`\`diff
          ${SCHEMA_DIFF}
          \`\`\`
          </details>

          **To backfill all collector versions after updating the parser:**
          \`\`\`
          uv run collector-watcher --backfill
          \`\`\`

          See [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})."

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$ISSUE_BODY"
            echo "Added comment to existing schema-drift issue #$EXISTING"
          else
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body "$ISSUE_BODY" \
              --label "schema-drift"
            echo "Created new schema-drift issue"
          fi

      - name: Close schema drift issue if schema is stable
        if: steps.detect_schema_drift.outputs.schema_changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_TITLE="[schema-drift] collector metadata-schema.yaml changed"
          EXISTING=$(gh issue list \
            --search "in:title \"$ISSUE_TITLE\"" \
            --state open \
            --label schema-drift \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" \
              --comment "Schema drift resolved: stored snapshot now matches the upstream schema."
            echo "Closed schema-drift issue #$EXISTING"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN:
            ${{ steps.repo_check.outputs.is_primary == 'true' && steps.otelbot-token.outputs.token
            || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="otelbot/automated-inventory-update"

          git add ecosystem-registry/

          git commit -m "Update registry inventory"

          git push -f origin HEAD:${BRANCH}

          PR_TITLE="[automated] Update registry inventory"
          PR_BODY="$(cat <<'EOF'
          Automated nightly scan detected changes in registry data.
          ---

          _This PR is automatically generated by the Nightly Registry Update workflow._
          EOF
          )"

          if gh pr list --head ${BRANCH} --state open --json number --jq '.[0].number' | grep -q .; then
            echo "Open PR already exists, updating..."
            gh pr edit ${BRANCH} --title "${PR_TITLE}" --body "${PR_BODY}"
          else
            echo "Creating new PR..."
            gh pr create --title "${PR_TITLE}" --body "${PR_BODY}" --base main --head ${BRANCH}
          fi

  notify-collector:
    permissions:
      contents: read
      issues: write
    needs: [synchronize-inventory]
    if: ${{ !cancelled() && needs.synchronize-inventory.result != 'skipped' }}
    uses: ./.github/workflows/reusable-workflow-notification.yml
    with:
      success: ${{ needs.synchronize-inventory.outputs.collector_result == 'success' }}
      watcher-name: "collector-watcher"

  notify-java:
    permissions:
      contents: read
      issues: write
    needs: [synchronize-inventory]
    if: ${{ !cancelled() && needs.synchronize-inventory.result != 'skipped' }}
    uses: ./.github/workflows/reusable-workflow-notification.yml
    with:
      success: ${{ needs.synchronize-inventory.outputs.java_result == 'success' }}
      watcher-name: "java-instrumentation-watcher"

  notify-configuration:
    permissions:
      contents: read
      issues: write
    needs: [synchronize-inventory]
    if: ${{ !cancelled() && needs.synchronize-inventory.result != 'skipped' }}
    uses: ./.github/workflows/reusable-workflow-notification.yml
    with:
      success: ${{ needs.synchronize-inventory.outputs.configuration_result == 'success' }}
      watcher-name: "configuration-watcher"
