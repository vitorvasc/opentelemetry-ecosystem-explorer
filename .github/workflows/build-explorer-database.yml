name: Build Explorer Database

on:
  schedule:
    # Nightly incremental build of all ecosystems at 06:00 UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        required: true
        type: choice
        options:
          - "incremental"
          - "clean"
        default: "incremental"
      ecosystem:
        description: "Ecosystem to build"
        required: true
        type: choice
        options:
          - "all"
          - "javaagent"
          - "configuration"
          - "collector"
        default: "all"

permissions:
  contents: read # Default minimum; the build-database job declares its own elevated scopes

concurrency:
  # Serialize every run of this workflow. A scheduled `all` build and a manual
  # single-ecosystem build both write to ecosystem-explorer/public/data/ and bump
  # DB_VERSION, so running them concurrently could produce overlapping automated
  # PRs and merge conflicts. cancel-in-progress stays false so queued runs wait
  # rather than being dropped.
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build-database:
    name: Build explorer database
    permissions:
      contents: write # Push generated database to the otelbot/automated-explorer-database-update branch
      pull-requests: write # Create or update the automated database-update PR
      issues: write # Open/update/close the "collector components missing display_name" tracking issue
    runs-on: ubuntu-latest
    steps:
      - name: Detect repository type (if on a fork we use different git config)
        id: repo_check
        env:
          REPO: ${{ github.repository }}
        run: |
          if [ "$REPO" == "open-telemetry/opentelemetry-ecosystem-explorer" ]; then
            echo "is_primary=true" >> $GITHUB_OUTPUT
          else
            echo "is_primary=false" >> $GITHUB_OUTPUT
          fi

      # Mint the otelbot App token for the PR operations below (create / edit /
      # close-reopen). The otelbot App installed on this repo only holds
      # `pull-requests: write` and has no `contents: write`, so it cannot push.
      # The branch push therefore authenticates as GITHUB_TOKEN; we re-trigger
      # the required checks afterwards by closing and reopening the PR with this
      # App token (see the "Commit and push changes" step).
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        if: steps.repo_check.outputs.is_primary == 'true'
        id: otelbot-token
        with:
          client-id: ${{ vars.OTELBOT_CLIENT_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-pull-requests: write # Create / edit / reopen the automated PR

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Persist GITHUB_TOKEN as the git credential for the branch push. A
          # push authenticated with GITHUB_TOKEN does not start workflows, so the
          # "Commit and push changes" step re-triggers the required checks on the
          # new head by closing/reopening the PR with the otelbot App token.
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Configure git (primary repository)
        if: steps.repo_check.outputs.is_primary == 'true'
        run: |
          .github/scripts/use-cla-approved-bot.sh

      - name: Configure git (fork)
        if: steps.repo_check.outputs.is_primary == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --locked

      - name: Build explorer database (incremental)
        # Scheduled runs don't set dispatch inputs, so `inputs.build_mode` is
        # empty; default to an incremental build in that case.
        if: ${{ (inputs.build_mode || 'incremental') == 'incremental' }}
        env:
          ECOSYSTEM: ${{ inputs.ecosystem || 'all' }}
        # --collector-audit-report writes a build artifact (not committed to the database)
        # consumed by the "Sync missing-display_name tracking issue" step below.
        run:
          uv run explorer-db-builder --ecosystem "$ECOSYSTEM" --collector-audit-report
          "${RUNNER_TEMP}/collector-missing-display-names.json"

      - name: Build explorer database (clean)
        if: inputs.build_mode == 'clean'
        env:
          ECOSYSTEM: ${{ inputs.ecosystem }}
        run:
          uv run explorer-db-builder --ecosystem "$ECOSYSTEM" --clean --collector-audit-report
          "${RUNNER_TEMP}/collector-missing-display-names.json"

      - name: Sync missing-display_name tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_FILE: ${{ runner.temp }}/collector-missing-display-names.json
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ ! -f "$REPORT_FILE" ]; then
            echo "No collector audit report at $REPORT_FILE (collector not built); skipping."
            exit 0
          fi

          ISSUE_TITLE="Collector components missing display_name"
          LABEL="upstream-metadata"

          # Idempotent: no-op if the label already exists.
          gh label create "$LABEL" \
            --description "Metadata that should be fixed in the upstream OpenTelemetry repositories" \
            --color "d4c5f9" 2>/dev/null || true

          COUNT=$(jq '.missing | length' "$REPORT_FILE")
          VERSION=$(jq -r '.version' "$REPORT_FILE")

          EXISTING=$(gh issue list \
            --search "in:title \"$ISSUE_TITLE\"" \
            --state open \
            --label "$LABEL" \
            --json number \
            --jq '.[0].number // empty')

          if [ "$COUNT" -eq 0 ]; then
            if [ -n "$EXISTING" ]; then
              gh issue close "$EXISTING" \
                --comment "All collector components in \`v${VERSION}\` now have a \`display_name\`. Closing."
              echo "Closed tracking issue #$EXISTING (no components missing display_name)."
            else
              echo "No components missing display_name and no open issue; nothing to do."
            fi
            exit 0
          fi

          BODY_FILE="${RUNNER_TEMP}/missing-display-names-body.md"
          {
            jq -r '
              . as $r
              | "The following components in the latest collector release (`v\($r.version)`) are missing a `display_name` in their upstream `metadata.yaml`. Fixing them upstream (opentelemetry-collector / opentelemetry-collector-contrib) lets them render with a friendly name in the Ecosystem Explorer.\n\n**Total missing: \($r.missing | length)**\n"
                + ( $r.missing
                    | group_by(.distribution)
                    | map(
                        "\n## \(.[0].distribution)\n"
                        + ( group_by(.type)
                            | map( "\n### \(.[0].type)\n" + ( map("- `\(.name)`") | join("\n") ) )
                            | join("\n") ) )
                    | join("\n") )
            ' "$REPORT_FILE"
            echo ""
            echo ""
            echo "---"
            echo "_This issue is maintained automatically by the [Build Explorer Database](https://github.com/${REPO}/actions/runs/${RUN_ID}) workflow. It is updated nightly and closed automatically once every component has a display_name._"
          } > "$BODY_FILE"

          if [ -n "$EXISTING" ]; then
            # Edit the body rather than comment: this runs nightly and comments would be noisy.
            gh issue edit "$EXISTING" --body-file "$BODY_FILE"
            echo "Updated tracking issue #$EXISTING ($COUNT components missing display_name)."
          else
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body-file "$BODY_FILE" \
              --label "$LABEL"
            echo "Created tracking issue ($COUNT components missing display_name)."
          fi

      - name: Check for database changes
        id: check_changes
        run: |
          git add -N ecosystem-explorer/public/data/ 2>/dev/null || true
          if git diff --quiet ecosystem-explorer/public/data/ && [ -z "$(git ls-files --others --exclude-standard ecosystem-explorer/public/data/)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Increment DB cache schema version
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          FILE="ecosystem-explorer/src/lib/api/idb-cache.ts"
          CURRENT=$(grep -oP 'const DB_VERSION = \K[0-9]+' "$FILE")
          if [ -z "$CURRENT" ]; then
            echo "Could not find DB_VERSION in $FILE"
            exit 1
          fi
          NEW=$((CURRENT + 1))
          sed -i "s/const DB_VERSION = ${CURRENT};/const DB_VERSION = ${NEW};/" "$FILE"
          VERIFY=$(grep -oP 'const DB_VERSION = \K[0-9]+' "$FILE")
          if [ "$VERIFY" != "$NEW" ]; then
            echo "sed replacement failed: expected DB_VERSION=$NEW but found $VERIFY"
            exit 1
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN:
            ${{ steps.repo_check.outputs.is_primary == 'true' && steps.otelbot-token.outputs.token
            || secrets.GITHUB_TOKEN }}
          ECOSYSTEM: ${{ inputs.ecosystem || 'all' }}
          BUILD_MODE: ${{ inputs.build_mode || 'incremental' }}
          # On scheduled runs github.actor doesn't reflect a human who triggered
          # the build, so attribute those runs to the schedule instead.
          ACTOR: ${{ github.event_name == 'schedule' && 'nightly schedule' || github.actor }}
        run: |
          BRANCH="otelbot/automated-explorer-database-update-${ECOSYSTEM}"

          git add ecosystem-explorer/public/data/ ecosystem-explorer/src/lib/api/idb-cache.ts

          git commit -m "Update explorer database (${ECOSYSTEM})"

          git push -f origin HEAD:${BRANCH}

          PR_TITLE="[automated] Update explorer database (${ECOSYSTEM})"
          PR_BODY="$(cat <<EOF
          Automated database build.

          Build mode: ${BUILD_MODE}
          Ecosystem: ${ECOSYSTEM}
          Triggered by: ${ACTOR}
          ---

          _This PR is automatically generated by the Build Explorer Database workflow._
          EOF
          )"

          # Try to create PR, or update if it already exists
          if ! gh pr create --title "${PR_TITLE}" --body "${PR_BODY}" --base main --head ${BRANCH} 2>&1 | tee pr-output.txt; then
            if grep -q "already exists" pr-output.txt; then
              echo "PR already exists, updating..."
              PR_NUMBER="$(gh pr list --head ${BRANCH} --state open --json number --jq '.[0].number // empty')"
              if [ -z "$PR_NUMBER" ]; then
                echo "Failed to find existing PR for branch ${BRANCH}"
                cat pr-output.txt
                exit 1
              fi
              gh pr edit "$PR_NUMBER" --title "${PR_TITLE}" --body "${PR_BODY}"
              # The force-push above is authenticated with GITHUB_TOKEN, which
              # does not start workflows, so CodeQL never re-runs for the new
              # head and the PR stays blocked on the "Code scanning results"
              # merge rule. Closing and reopening the PR with the otelbot App
              # token emits a `pull_request: reopened` event that re-runs the
              # required checks against the updated head.
              gh pr close "$PR_NUMBER"
              gh pr reopen "$PR_NUMBER"
            else
              echo "Failed to create PR"
              cat pr-output.txt
              exit 1
            fi
          fi

      - name: No changes detected
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "No database changes detected. Skipping PR creation."
