name: PR Screenshots - Cleanup

# Deletes the screenshots subfolder for a closed PR from the upstream
# `otelbot/screenshots` orphan branch. Uses pull_request_target (not pull_request)
# so the token has contents: write even when the PR comes from a fork.
# No PR code is checked out here — only the upstream otelbot/screenshots branch.

on:
  # Needs pull_request_target for contents: write to push to the
  # otelbot/screenshots branch on fork PR close events. Safe because
  # no PR code is checked out — only the trusted base branch and the
  # internal otelbot/screenshots branch ever execute here.
  # https://docs.zizmor.sh/audits/#dangerous-triggers
  # zizmor: ignore[dangerous-triggers]
  pull_request_target:
    branches: [main]
    types: [closed]

permissions:
  contents: read # Default minimum; job-level write scope is set on the cleanup job

concurrency:
  group: screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    name: Clean up PR screenshots
    permissions:
      contents: write # Delete a PR's screenshot subtree from the otelbot/screenshots branch
    # Disabled to avoid breaking images on older PRs. Flip to `true` to re-enable deletion.
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          # Persisted credentials are required so the later `git push origin
          # otelbot/screenshots` step can authenticate.
          persist-credentials: true

      - name: Use CLA approved github bot
        run: .github/scripts/use-cla-approved-bot.sh

      - name: Delete PR screenshots
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if ! git ls-remote --exit-code --heads origin otelbot/screenshots > /dev/null 2>&1; then
            echo "No otelbot/screenshots branch found, nothing to clean up."
            exit 0
          fi

          git fetch origin otelbot/screenshots
          git checkout -B otelbot/screenshots FETCH_HEAD

          if [ ! -d "${PR_NUMBER}" ]; then
            echo "No screenshots for PR #${PR_NUMBER}, nothing to clean up."
            exit 0
          fi

          git rm -rf "${PR_NUMBER}/"
          git commit -m "chore: remove screenshots for PR #${PR_NUMBER}"
          git push origin otelbot/screenshots
