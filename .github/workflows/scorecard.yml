name: OSSF Scorecard

on:
  push:
    branches:
      - main
  schedule:
    - cron: "21 14 * * 3" # weekly at 14:21 (UTC) on Wednesday
  workflow_dispatch:

permissions:
  contents: read # Default minimum; the analysis job declares its full scope set

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    if:
      github.event_name != 'schedule' || github.repository ==
      'open-telemetry/opentelemetry-ecosystem-explorer'
    runs-on: ubuntu-latest
    # Scorecard checks need broad read access to inspect repo configuration,
    # workflow history, PR/issue activity, and CI statuses. See
    # https://github.com/ossf/scorecard-action#workflow-restrictions
    permissions:
      security-events: write # Upload SARIF results to Code Scanning
      id-token: write # Required when publish_results: true (OIDC token for OSSF)
      contents: read # Scorecard reads repository file contents
      actions: read # Scorecard inspects workflow run history
      issues: read # Scorecard's GraphQL ListCommits paths
      pull-requests: read # Scorecard analyzes PR activity
      checks: read # Scorecard detects SAST tools from check runs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      # Upload the results as artifacts (optional). Commenting out will disable
      # uploads of run results in SARIF format to the repository Actions tab.
      # https://docs.github.com/en/actions/advanced-guides/storing-workflow-data-as-artifacts
      - name: "Upload artifact"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      # Upload the results to GitHub's code scanning dashboard (optional).
      # Commenting out will disable upload of results to your repo's Code Scanning dashboard
      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: results.sarif
