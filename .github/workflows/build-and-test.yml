  test-ecosystem-explorer:
    name: Test ecosystem-explorer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecosystem-explorer
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
          cache: true
          cache-dependency-path: ecosystem-explorer/bun.lock

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Run integration tests
        run: bun run test:integration

      - name: Run build
        run: bun run build

  schemas-up-to-date:
    name: Schemas up to date
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecosystem-explorer
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
          cache: true
          cache-dependency-path: ecosystem-explorer/bun.lock

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate schemas
        run: bun run generate-schemas

      - name: Fail if schemas are out of sync
        run: |
          if ! git diff --quiet -- public/schemas || [ -n "$(git ls-files --others --exclude-standard public/schemas)" ]; then
            echo "::error::public/schemas is out of sync with src/types. Run 'bun run generate-schemas' in ecosystem-explorer/ and commit the result."
            git diff -- public/schemas
            git ls-files --others --exclude-standard public/schemas
            exit 1
          fi
