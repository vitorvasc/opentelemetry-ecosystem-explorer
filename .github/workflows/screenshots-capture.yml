name: PR Screenshots - Capture

# First half of a two-workflow setup for safe fork PR support.
# This job runs on pull_request (contents: read only) so fork code can execute
# without write access. It captures screenshots and uploads them as artifacts,
# which screenshots-commit.yml then downloads and commits with contents: write.

on:
  pull_request:
    branches: [main]
    types: [labeled, synchronize]

concurrency:
  group: screenshots-capture-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  capture:
    if: contains(github.event.pull_request.labels.*.name, 'add-screenshots')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecosystem-explorer
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build the frontend
        run: bun run build

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Take screenshots
        run: node scripts/take-screenshots.mjs

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: screenshots-${{ github.run_id }}
          path: ecosystem-explorer/screenshots/
          retention-days: 1

      - name: Save PR metadata
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          mkdir -p /tmp/pr-metadata
          printf '%s' "$PR_NUMBER" > /tmp/pr-metadata/pr_number.txt
          printf '%s' "$HEAD_REF"  > /tmp/pr-metadata/head_ref.txt
          printf '%s' "$HEAD_REPO" > /tmp/pr-metadata/head_repo.txt

      - name: Upload PR metadata artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-metadata-${{ github.run_id }}
          path: /tmp/pr-metadata/
          retention-days: 1
