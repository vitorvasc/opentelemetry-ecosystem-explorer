component_owners:
- onurtemizkan
description: OpenTelemetry instrumentation for `mongodb` database client for MongoDB
in_auto_instrumentations_node: true
name: instrumentation-mongodb
node_engine: ^18.19.0 || >=20.6.0
npm_package: '@opentelemetry/instrumentation-mongodb'
