- exclude: 4.17.2
  mode: max-5
  package: mongodb
  range: '>=4 <5'
  source: .tav.yml
- mode: max-5
  package: mongodb
  range: '>=5 <6'
  source: .tav.yml
- mode: max-7
  package: mongodb
  range: '>=6 <7'
  source: .tav.yml
- mode: max-7
  package: mongodb
  range: '>=7 <8'
  source: .tav.yml
version: 0.71.0
