component_owners:
- maryliag
- raphael-theriault-swi
description: OpenTelemetry instrumentation for `pg` and `pg-pool` database client
  for PostgreSQL
in_auto_instrumentations_node: true
name: instrumentation-pg
node_engine: ^18.19.0 || >=20.6.0
npm_package: '@opentelemetry/instrumentation-pg'
repository: open-telemetry/opentelemetry-js-contrib
source_path: packages/instrumentation-pg
supported_versions:
- package: pg
  source: README.md
  version_range: '>=8.0.3 <9'
- package: pg-pool
  source: README.md
  version_range: '>=2.0.0 <4'
tested_versions:
- mode: max-7
  package: pg
  range: '>=8.0.3 <9'
  source: .tav.yml
version: 0.70.0
