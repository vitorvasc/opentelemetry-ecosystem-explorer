globs:
  - "**/*.md"
ignores:
  - CLAUDE.md
  - "**/AGENTS.md"
  - "ecosystem-explorer/DESIGN.md"
  - "**/tmp_repos/**"
  - "**/node_modules/**"
  - ".claude/**"
  - "ecosystem-registry/**"

config:
  default: true
  MD013:
    line_length: 120
    tables: false
  MD033:
    allowed_elements:
      - details
      - summary
  MD041: false
