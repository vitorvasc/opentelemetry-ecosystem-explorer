[build]
base = "ecosystem-explorer"
publish = "dist"
command = """
  if [[ "$HEAD" == feat/84-* || "$BRANCH" == feat/84-* ]]; then
    export VITE_FEATURE_FLAG_V1_REDESIGN=true
  fi
  npm run netlify-build:preview
"""

[context.production]
command = "npm run netlify-build:production"

[context.production.environment]
VITE_FARO_URL = "https://faro-collector-prod-us-east-2.grafana.net/collect/e587d17d38a90612e9dbedd3a3146b77"

[context.deploy-preview.environment]
VITE_FEATURE_FLAG_COLLECTOR_PAGE = "true"

[context.branch-deploy.environment]
VITE_FEATURE_FLAG_COLLECTOR_PAGE = "true"

[[edge_functions]]
function = "agent-negotiation"
path = "/*"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
Referrer-Policy = "strict-origin-when-cross-origin"
Content-Security-Policy = "frame-ancestors 'self';"
