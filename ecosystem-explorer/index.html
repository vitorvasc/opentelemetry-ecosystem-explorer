    <script>
      (function () {
        function fromSystem() {
          try {
            return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          } catch (e) {
            return "dark";
          }
        }
        try {
          var stored = localStorage.getItem("td-color-theme");
          var resolved = stored === "light" || stored === "dark" ? stored : fromSystem();
          document.documentElement.dataset.theme = resolved;
        } catch (e) {
          document.documentElement.dataset.theme = fromSystem();
        }
      })();
    </script>
